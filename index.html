<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wetter &amp; Präsentation – Leipzig-Lößnig</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-layout">

    <!-- LINKE SEITE: Video randlos, Autostart, Endlosschleife -->
    <section class="media-panel">
      <div class="video-frame">
        <video autoplay loop muted playsinline>
          <source src="assets/praesentation.mp4" type="video/mp4" />
          Dein Browser kann dieses Video nicht abspielen.
        </video>
      </div>
    </section>

    <!-- RECHTE SEITE: Wetterdaten -->
    <aside class="weather-panel" aria-label="Wetterinformationen für Leipzig-Lößnig">

      <section class="current-weather card" aria-live="polite">
        <div>
          <h3>So ist das Wetter jetzt</h3>
          <p id="currentTime" class="muted">Lade aktuelle Daten …</p>
        </div>
        <div class="weather-overview">
          <span id="weatherIcon" class="weather-emoji" aria-hidden="true">⛅</span>
          <div>
            <p id="weatherSummary" class="weather-summary">Bitte warten …</p>
            <p id="temperature" class="temperature">-- °C</p>
          </div>
        </div>
      </section>

      <div class="advice-grid">
        <article class="card therm-card">
          <h3>Thermometer</h3>
          <div class="thermometer">
            <div class="therm-track">
              <div class="therm-fill" id="thermFill"></div>
            </div>
            <p class="therm-label" id="thermLabel">-- °C</p>
          </div>
        </article>

        <article class="card">
          <h3>Empfohlenes Oberteil</h3>
          <div class="clothing-reco">
            <span class="clothing-icon" id="clothingIcon">👕</span>
            <div>
              <p class="clothing-title" id="clothingTitle">Lade Empfehlung …</p>
              <p class="muted" id="clothingHint">Bitte einen Moment.</p>
            </div>
          </div>
        </article>
      </div>

      <section class="forecast-section card">
        <h3>Vorhersage für die nächsten 3 Tage</h3>
        <div class="forecast-grid" id="forecast"></div>
      </section>

    </aside>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
